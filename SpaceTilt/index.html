<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Tilt Runner</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="score-board">Score: <span id="score">0</span></div>
    </div>

    <div id="start-screen" class="screen">
        <h1>SPACE TILT</h1>
        <p>Tilt your device or drag across the screen to dodge asteroids.</p>
        <p id="control-status" class="status-text">Sensor check pending...</p>
        <button id="start-btn">Tap to Start / Request Sensor</button>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Tap to Restart</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <script src="./game.js" defer></script>
</body>
</html>
